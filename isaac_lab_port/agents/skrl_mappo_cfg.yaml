seed: 42

models:
  # Keep policy and value networks separate so MAPPO value can use centralized state space.
  separate: true
  policy:
    class: GaussianMixin
    clip_actions: true
    clip_log_std: true
    min_log_std: -5.0
    max_log_std: 2.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256]
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    network:
      - name: net
        input: STATES
        layers: [512, 256]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1

agent:
  class: MAPPO
  rollouts: 16
  # Deliberate deviation from SKRL defaults for continuity with prior experiments.
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-4
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.008
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  shared_state_preprocessor: RunningStandardScaler
  shared_state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: true
  entropy_loss_scale: 0.01
  value_loss_scale: 1.0
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: false
  experiment:
    directory: isaac_lab_port/runs
    experiment_name: no_vlm_mappo
    write_interval: 100
    checkpoint_interval: 1000

trainer:
  class: SequentialTrainer
  timesteps: 100000
  environment_info: log
